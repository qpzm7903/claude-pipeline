name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies & verify structure
        run: |
          pip install -r requirements.txt
          python3 verify_local.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (general-claude-pipeline)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/general-claude-pipeline
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push general-claude-pipeline image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile.general-agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Package source archive
        run: |
          TAG=${GITHUB_REF_NAME}
          tar --exclude='.git' \
              --exclude='.env' \
              --exclude='__pycache__' \
              --exclude='job-agent/dist' \
              -czf claude-pipeline-${TAG}-src.tar.gz \
              agent/ config/ k8s/ job-agent/ \
              requirements.txt verify_local.py \
              .env.example README.md CLAUDE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claude-pipeline-${{ github.ref_name }}-src.tar.gz
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}/general-claude-pipeline:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository }}/general-claude-pipeline:latest
            ```

            ## Quick Start

            ```bash
            # 1. 部署 LiteLLM 网关
            kubectl apply -f k8s/litellm.yaml

            # 2. 组装并部署 job-agent 任务
            bash job-agent/assemble.sh job-agent/tasks/<task-name>/job.yml --apply
            ```
