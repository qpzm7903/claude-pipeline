# 冒烟测试 v2: 验证 Skills + Settings.json 注入
#
# 目标仓库: https://github.com/qpzm7903/job-demo
# 任务: 利用 Skills 分析仓库并生成报告
#
# assemble: run.sh=components/run.sh
# assemble: prompt.md=tasks/smoke-test/prompt.md
# assemble: settings.json=components/settings.json
# assemble: skills=components/skills/repo-guard,components/skills/doc-sync

---
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-test-glm5
  namespace: claude-pipeline
spec:
  completions: 1
  backoffLimit: 0
  parallelism: 1
  template:
    spec:
      restartPolicy: Never
      hostNetwork: false
      containers:
        - name: agent
          image: general-claude-pipeline:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash"]
          args: ["-c", "bash /pipeline/run.sh"]
          env:
            # ── 模型：GLM 5.1 via LiteLLM ───────────────────────────
            - name: ANTHROPIC_BASE_URL
              value: "http://litellm.litellm.svc.cluster.local:4000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-bridge
                  key: ANTHROPIC_API_KEY
            - name: ANTHROPIC_MODEL
              value: "claude-sonnet-4-6"
            # ── Git ──────────────────────────────────────────────────
            - name: REPO_URL
              value: "https://github.com/qpzm7903/job-demo"
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GIT_TOKEN
            - name: GIT_AUTHOR_NAME
              value: "claude-pipeline"
            - name: GIT_AUTHOR_EMAIL
              value: "noreply@claude.local"
            # ── 执行参数 ──────────────────────────────────────────────
            - name: EXEC_MODE
              value: "single"
            - name: ROUND_TIMEOUT
              value: "600"
            - name: WORKSPACE
              value: "/workspace/data"
            - name: LOGS_DIR
              value: "/workspace/logs"
            - name: PROMPT_FILE
              value: "/pipeline/prompt.md"
            - name: ISC_SLEEP_TIME
              value: "120"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: pipeline-config
              subPath: run.sh
              mountPath: /pipeline/run.sh
            - name: pipeline-config
              subPath: prompt.md
              mountPath: /pipeline/prompt.md
      volumes:
        - name: pipeline-config
          configMap:
            name: smoke-test-glm5-config
            defaultMode: 0755
