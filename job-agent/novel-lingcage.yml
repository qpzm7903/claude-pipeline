kind: ConfigMap
apiVersion: v1
metadata:
  name: novel-lingcage-file
  namespace: default
data:
  "prompt.md": |-
    # 小说创作指令
    - 整本小说在50w字以内
    - 必须按照本文件（prompt.md）中的开发流程完成本次小说章节的更新。
    - 本次任务必须完成 10 章小说内容的续写（如果是首次运行，则从第1章开始写）。
    - 故事主线：以穿越《灵笼》世界（末日废土、灯塔、噬极兽等元素）为主线，主角同时具备穿越其他多元世界的金手指。**明确要求：主角可以穿越到如《斗破苍穹》、《吞噬星空》、《完美世界》等玄幻或高武世界获取资源与力量**。作为一部全新的小说，请从第1章开始构思写起。
    
    # 创作约束与节奏（Pacing & Limits）
    - **全书篇幅限制**：整部小说总字数需严格控制在 **50万字以内**（约 200 到 250 章）。
    - **单章字数要求**：每章字数应保持在 **2000 - 3000字** 之间。
    - **剧情节奏控制**：**极度重要！** 既然全书有近200章的篇幅，严禁在开局或中段过快推进主线、过早打败终极反派或草草结尾。每一卷、每十章都要有充分的细节铺垫、支线剧情、人物刻画和战斗过程，要有张有弛（注水不可取，但绝不能像写大纲一样写正文）。
    
    # 注意事项
    - prompt.md 文件用于下达指令给 AI，禁止修改 prompt.md 文件本身。
    - 采用 Markdown 格式组织目录，可按章节分文件管理（例如 `chapters/Chapter_01.md`），或统一存入大文件（如 `Novel.md`）。
    - 保证连贯性：写之前一定要先读取本地已有章节内容、故事设定和人物背景。
    - 授权自动执行文件读写与提交，无需批准确认。
    # 核心痛点防范：长文本上下文遗忘（Context Degradation）
    - **严禁一次性读取所有历史章节**：随着章节增加，读取所有文件会导致大模型上下文超限、注意力丢失、逻辑崩塌。
    - **只读取近期上下文**：每次续写前，**最多只允许读取最新更新的 3 到 5 章**，以及核心设定文件。
    - **维护设定集（Lore Bible）**：必须独立维护 `world_setting.md`（世界观与境界设定）、`characters.md`（人物关系与状态）和 `story_summary.md`（全书剧情极简大纲）。
    
    # 创作流程
    每次任务的执行遵循以下流程：
    
    ## 第一步：信息加载与状态同步 (State Loading - 防止遗忘设定的关键！)
    - **强制要求：每次开始创作前，必须先调用文件读取工具，真实地读取 `world_setting.md`、`characters.md` 和 `story_summary.md`**，以复习世界观、力量体系和前期剧情。如果没有这三个文件，则先创建它们。
    - **读取近期剧情**：仅读取目录中最新的 3 到 5 个章节文件，回顾当前的具体战斗、对话或场景进度。
    
    ## 第二步：慢思考与大纲规划 (Slow Thinking & Planning)
    - **深度剧情推演**：在正式写正文前，必须先在 `plan.md` 中进行“慢思考”。分析当前人物的动机、敌人的应对策略、环境的细节。
    - **更新大纲**：在 `plan.md` 中写下接下来 10 章的详细推演。请务必结合“50万字完本”的总篇幅，明确当前进度处于整本书的哪个阶段，**刻意放慢叙事节奏，增加悬念和波折**，确保战力不崩坏。
    
    ## 第三步：高质量正文撰写 (Writing)
    - 严格按照大纲，一章一章地输出（例如 `chapters/Chapter_31.md`）。
    - <style_guidelines> 
      请使用标准、流畅的现代中文小说断句风格。您的回复应该由流畅的散文段落组成。多使用句号和逗号来构建长句，保持文气贯通。当进行人物对话和动作描写时，请将它们自然地融入段落中，提供丰富的心理博弈、动作细节和环境渲染。确保每一场战斗和闭关都得到详尽、沉浸式的刻画。
      </style_guidelines>
    - 保持主角人设不崩，填平之前的伏笔，适当埋下新的悬念。
    
    ## 第四步：记忆归档与状态更新 (Memory Archiving)
    - **必须执行**：在完成 10 章写作后，将这 10 章的核心剧情浓缩成一段摘要，追加到 `story_summary.md` 中。
    - **更新设定集**：如果这 10 章中出现了新的人物、新的法宝、武功秘籍或新的地图，必须同步更新到 `world_setting.md` 和 `characters.md`。
    - 在 `plan.md` 中标记任务完成，并在 `README.md` 更新总进度。
    
    # Git 提交规范
    - 行为准则：严格禁止在提交信息中出现 AI 生成的相关字眼。
    - 采用 Conventional Commits 格式，用简体中文。例如 `feat(novel): 新增第31章到第40章，引入新地图`。
    - 所有工作完成后，提交并推送更新到本地 Git 仓库。

  "run.sh": |-
    #!/bin/bash

    set -ex

    _fmt_stream() {
        # 仅调用 Python 脚本进行格式化，输出到 stdout
        # 确保 python 使用非缓冲模式 (-u)，以便 tee 能实时捕获
        python3 -u "/agent/lib/fmt_stream.py"
    }

    # 数据目录初始化
    mkdir -pv /workspace/data/ /workspace/logs/

    # 清空输出目录 (仅在开始前清空，确保干净)
    rm -rf /workspace/data/*

    # 工作目录
    cd /workspace/data/

    # 设置全局用户名和邮箱
    git config --global user.name "novel-bot"
    git config --global user.email "noreply@novel-bot.com"

    # 使用 GH_TOKEN 进行授权（已通过环境变量提供，无需额外 login）
    if [ -z "${GH_TOKEN}" ]; then
        echo "GH_TOKEN is not set"
        exit 1
    fi

    # 明确指定的仓库地址（格式: 组织名/仓库名）
    TARGET_REPO="qpzm7903/novel-1"

    # 检查仓库是否存在，不存在则创建
    if ! gh repo view "${TARGET_REPO}" &>/dev/null; then
        echo "Repository not found. Creating..."
        # 获取纯仓库名
        REPO_NAME=$(basename "${TARGET_REPO}")
        gh repo create "${REPO_NAME}" --private --add-readme
        sleep 5
    fi

    # 克隆仓库（使用 GH_TOKEN 授权）
    if [ ! -d ".git" ]; then
        git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" .
    fi

    # 复制 prompt.md 到工作目录以便 Claude 读取
    cp /workspace/prompt.md /workspace/data/prompt.md

    # 检查版本
    claude --version

    # 执行多Agent协作任务 (Multi-Agent Collaboration)
    
    echo "=== [Agent 1] 剧情总编剧 (Planner) ==="
    timeout ${ISC_CLAUDE_CODE_TIMEOUT:-"3600"} \
        claude --dangerously-skip-permissions --print --verbose --output-format stream-json --model "glm-5.1" -p "工作目录为: /workspace/data/。你是【剧情总编剧】Agent。请先调用文件读取工具读取 story_summary.md、world_setting.md 以及最近的几章正文。然后结合 prompt.md 中的总体要求，在 plan.md 中深度推演并写下接下来 10 章的详细大纲（不要去写小说正文！）。" \
        2>&1 | tee /workspace/logs/planner_result.txt | _fmt_stream | tee /workspace/logs/planner_pretty.txt || true

    echo "=== [Agent 2] 网文主笔 (Writer) ==="
    timeout ${ISC_CLAUDE_CODE_TIMEOUT:-"7200"} \
        claude --dangerously-skip-permissions --print --verbose --output-format stream-json --model "kimi-k2.6" -p "工作目录为: /workspace/data/。你是【网文主笔】Agent。请读取 plan.md 中最新的大纲。严格按照大纲，结合 prompt.md 的文风要求，一章一章地编写接下来的 10 章正文并保存到 chapters/ 目录中。你的任务仅限写正文，写完即止。" \
        2>&1 | tee /workspace/logs/writer_result.txt | _fmt_stream | tee /workspace/logs/writer_pretty.txt || true

    echo "=== [Agent 3] 设定管理员 (Lore Master) ==="
    timeout ${ISC_CLAUDE_CODE_TIMEOUT:-"3600"} \
        claude --dangerously-skip-permissions --print --verbose --output-format stream-json --model "glm-5.1" -p "工作目录为: /workspace/data/。你是【设定管理员】Agent。请阅读刚刚由主笔新写出的正文。将新剧情提炼追加到 story_summary.md 中，并把正文中新出现的人物、功法、地图更新到 world_setting.md 和 characters.md 中。" \
        2>&1 | tee /workspace/logs/loremaster_result.txt | _fmt_stream | tee /workspace/logs/loremaster_pretty.txt || true

    # 获取管道中第一个命令 (timeout) 的退出码
    if [ "${PIPESTATUS[0]}" -eq 124 ]; then
        echo "⚠️ Claude Code 执行超时, 强制结束"
    fi

    # 提交代码
    git add .
    git status
    # 只有当有变更时才辅助 commit（以防 Claude 没有自主 commit）
    if ! git diff-index --quiet HEAD; then
        git commit -m "Add 10 new chapters"
    else
        echo "No unstaged changes to commit"
    fi

    # 无论是否有未提交代码，始终推送所有本地 commit 到远程仓库
    git push origin main || git push origin master || true

    # 打印结果
    tail -n 10 /workspace/logs/result.txt || true

    if [ -n "${ISC_SLEEP_TIME}" ]; then
        sleep ${ISC_SLEEP_TIME}s
    fi

---

apiVersion: batch/v1
kind: Job
metadata:
  name: novel-lingcage-job
  namespace: default
spec:
  completions: 20
  backoffLimit: 0
  parallelism: 1
  template:
    spec:
      containers:
        - name: novel-lingcage-job
          image: general-claude-pipeline:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
          args:
            - -c
            - 'bash /workspace/run.sh'
          env:
            - name: "GH_TOKEN"
              value: "***REVOKED-GITHUB-PAT***"
            - name: "ANTHROPIC_BASE_URL"
              value: "http://litellm.litellm.svc.cluster.local:4000"
            - name: "ANTHROPIC_API_KEY"
              value: "sk-1234"
            - name: "ANTHROPIC_MODEL"
              value: "deepseek-chat"
            - name: "ISC_CLAUDE_CODE_PROMPT"
              value: |
                你是一个小说作家。请在这个已包含小说的 GitHub 仓库工作目录中继续编写小说。
                故事要求：以穿越《灵笼》世界（末日废土、灯塔、噬极兽等元素）为主线，主角同时具备穿越其他多元世界的金手指。明确要求：主角可以穿越到如《斗破苍穹》、《吞噬星空》、《完美世界》等玄幻或高武世界获取资源与力量。
                本次执行任务：**请务必先调用文件阅读工具，真实地读取 `story_summary.md`、`world_setting.md` 等设定文件（这对于防止吃书和保持连贯性至关重要），然后再读取最新几章进度**。接着，好好思考、慢慢推演剧情，最后往下编写10章小说的内容。如果是首次运行则从第1章开始。
                充分发挥你的创造力，每一章的字数要丰富，情节要跌宕起伏。并且绝对禁止滥用破折号（——）。
                将编写的小说内容以 markdown 格式保存到当前工作目录下，可以按章节分文件或者追加到一个大文件中。
                请直接进行小说的编写并确保文件已被修改。
            - name: "ISC_CLAUDE_CODE_TIMEOUT"
              value: "7200"
            - name: "ISC_SLEEP_TIME"
              value: "60"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 2000m
              memory: 4000Mi
          volumeMounts:
            - name: config-volume
              subPath: run.sh
              mountPath: /workspace/run.sh
            - name: config-volume
              subPath: prompt.md
              mountPath: /workspace/prompt.md
      restartPolicy: Never
      hostNetwork: false
      volumes:
        - name: config-volume
          configMap:
            name: novel-lingcage-file
