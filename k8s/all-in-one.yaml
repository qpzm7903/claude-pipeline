# Claude Pipeline - Kubernetes 基础设施清单
#
# 使用方法:
#   kubectl apply -f k8s/all-in-one.yaml
#
# 注意: Secret 需要单独创建，请参考 k8s/secret.yaml.example
#

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: claude-pipeline
  labels:
    app.kubernetes.io/name: claude-pipeline
    app.kubernetes.io/managed-by: claude-pipeline

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-pipeline-agent
  namespace: claude-pipeline
  labels:
    app.kubernetes.io/name: claude-pipeline
    app.kubernetes.io/component: rbac

---
# PersistentVolumeClaim - 缓存存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cargo-registry-cache
  namespace: claude-pipeline
  labels:
    app.kubernetes.io/name: claude-pipeline
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # 使用默认 StorageClass（Docker Desktop 为 hostpath）
  # storageClassName: standard

---
# Secret 示例（请复制为 secret.yaml 并填入真实值）
# 使用方法:
#   cp k8s/secret.yaml.example k8s/secret.yaml
#   编辑 k8s/secret.yaml，填入 base64 编码的真实值
#   kubectl apply -f k8s/secret.yaml
#
# 获取 base64 编码:
#   echo -n 'sk-ant-...' | base64
#   echo -n 'ghp_...' | base64
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: claude-pipeline-secrets
#   namespace: claude-pipeline
# type: Opaque
# data:
#   ANTHROPIC_API_KEY: ""   # echo -n 'your-api-key' | base64
#   GIT_TOKEN: ""           # echo -n 'your-git-token' | base64