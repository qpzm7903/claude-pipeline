# Phase 1: OAuth2 Server 从零建设
#
# 目标：在空仓 https://github.com/qpzm7903/job-demo 上，由 agent 自主按 BMAD
#       小步快跑策略，逐版本（v0.1.0 → v0.5.x）构建一个可运行的 OAuth2 授权服务。
#       每版本一个 commit + 一个 tag，全部推回 GitHub。
#
# 后续 Phase 2~6 的前置：本 Job 必须成功至少推出 v0.1.0 的代码骨架。
#
# 前置 Secret：
#   - litellm-bridge.ANTHROPIC_API_KEY  (已存在，指向 LiteLLM master key)
#   - github-token.GIT_TOKEN            (已由 .env 同步)
#
# 用法：
#   kubectl apply -f k8s/smoke-tests/oauth2-greenfield-build.yaml
#   kubectl -n claude-pipeline logs -f -l job-name=oauth2-greenfield-build
#   kubectl -n claude-pipeline delete -f k8s/smoke-tests/oauth2-greenfield-build.yaml
---
# Greenfield build prompt —— 独立成 ConfigMap，便于后续版本迭代时直接改
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-greenfield-prompt
  namespace: claude-pipeline
data:
  prompt.md: |
    你是一个自主开发 Agent，目标是从零构建一个 OAuth2 授权服务器。
    人类不在线，不要等确认。每一轮按 BMAD 流程走：规划 → 开发 → 测试 → 提交 → 推送 → 打 tag。

    ## 项目目标
    在当前空仓 job-demo 上，从 0 构建一个可运行的 OAuth2 授权服务。

    ## 技术栈（硬约束）
    - JDK 17
    - Maven（禁止用 Gradle）
    - Spring Boot 3.2.x
    - Spring Authorization Server（依赖 spring-boot-starter-oauth2-authorization-server）
    - H2 内存数据库（验证用，不做持久化）
    - JUnit 5 + Spring Boot Test

    ## 版本路线图（每轮推进一个版本，先写 plan.md 再开发）
    - v0.1.0：Maven 骨架 + Spring Boot 3 可启动 + 一个公开端点 GET /hello 返回字符串
    - v0.2.0：集成 Spring Authorization Server，配置一个 in-memory 客户端（client_id=demo-client, scopes=read），暴露 /oauth2/token
    - v0.3.0：支持 client_credentials 授权流；token 为 JWT 并通过 /oauth2/jwks 暴露 JWK
    - v0.4.0：新增 authorization_code 授权流，带最简登录页（Thymeleaf 或 HTML 模板）
    - v0.5.0：为核心 Service / Controller 补单元测试，覆盖率 >= 60%

    ## 每轮流程（严格执行）
    1. **Planning**
       - 阅读 plan.md（如无则创建）
       - 运行 mvn clean package -DskipTests > /tmp/build.log 2>&1; tail -30 /tmp/build.log
       - 若构建失败：本轮目标是 PATCH 修复（版本号递增 .Z）
       - 若 plan.md 中下一个 MINOR 未完成：本轮目标是开发该 MINOR 版本
       - 若已完成到 v0.5.0：本轮目标是小范围完善（补文档、清理 TODO），递增 PATCH

    2. **Development**
       - 只改本版本范围内的文件，最小化改动
       - 代码中中文日志用于人类可读
       - 严禁硬编码真实密钥；JWK 用 Spring 默认生成方式即可
       - 严禁引入 Gradle、Lombok 依赖冲突、Spring Security 5.x（必须 Spring Boot 3 对应的 SAS 1.x）

    3. **Testing**
       - mvn clean package -DskipTests > /tmp/build.log 2>&1; tail -30 /tmp/build.log —— 必须通过
       - 若本版本包含测试（v0.5.0）：mvn test > /tmp/test.log 2>&1; tail -30 /tmp/test.log —— 必须绿

    4. **Commit & Push & Tag**
       - Conventional Commits 简体中文：feat(auth): 新增 xxx 之类
       - 每版本完成 → git tag v0.X.Y → git push origin main --tags
       - **强制约束**：本轮必须产生至少 1 个 commit 并 push；否则流水线守门会判本轮失败

    5. **Documentation**
       - 更新 README.md 说明当前版本能跑什么、怎么跑、怎么验证 /oauth2/token
       - 在 plan.md 中标记已完成的版本

    ## 输出控制（防 token 爆炸）
    - 长命令输出必须重定向到 /tmp/*.log 后 tail 查看，禁止把完整 Maven 输出带入对话
    - 禁止 cat 大型 jar / target 目录

    ## 本轮判断优先级
    1. 构建失败 → PATCH 修复
    2. plan.md 中有下一个 MINOR 未做 → 做它
    3. 都完成 → 本轮产出一个 docs 或 chore 类 PATCH

    现在开始第一轮：仓库为空，plan.md 也不存在，你应该：
    (1) 创建 plan.md 落下完整版本路线图
    (2) 实现 v0.1.0（pom.xml + Spring Boot 应用类 + /hello 端点 + README.md）
    (3) mvn clean package -DskipTests 通过
    (4) git add + commit(feat: 初始化项目与 v0.1.0 骨架) + push + tag v0.1.0
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oauth2-greenfield-build
  namespace: claude-pipeline
spec:
  # 调试期不自动清理，稳定后可加回 ttlSecondsAfterFinished
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: agent
        image: claude-pipeline-agent:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ANTHROPIC_BASE_URL
          value: "http://litellm.litellm:4000"
        - name: ANTHROPIC_MODEL
          value: "deepseek-chat"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-bridge
              key: ANTHROPIC_API_KEY
        - name: REPO_URL
          value: "https://github.com/qpzm7903/job-demo"
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: GIT_TOKEN
        - name: GIT_AUTHOR_NAME
          value: "qpzm7903"
        - name: GIT_AUTHOR_EMAIL
          value: "noreply@qpzm7903.local"
        - name: PIPELINE_MODE
          value: "custom"
        - name: EXEC_MODE
          value: "iterate"
        - name: CLAUDE_PROMPT_FILE
          value: "/prompts/prompt.md"
        - name: ROUND_TIMEOUT
          value: "900"          # 单轮 15 分钟，Maven 首次下载依赖会较慢
        - name: MAX_ITERATIONS
          value: "8"            # 上限 8 轮，避免失控烧 token
        - name: MAX_NOCHANGE
          value: "2"            # 连续 2 轮无 commit 即判定收敛退出
        - name: ITER_COOLDOWN
          value: "15"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        volumeMounts:
        - name: prompt
          mountPath: /prompts
          readOnly: true
      volumes:
      - name: prompt
        configMap:
          name: oauth2-greenfield-prompt
