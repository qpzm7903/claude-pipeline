# Phase 4: OAuth2 Server 性能优化验证
#
# 前置：Phase 1 已完成，仓库含 v0.5.x + 完整测试
# 目标：用 task-perf-optimize.md 的理念做可测量的性能优化
#       重点：必须"先测量，后优化"，不接受凭感觉优化
#
# 策略：
#   - 优化方向限定为"加可观测性 + 缓存易变更少的资源"
#   - 具体目标：集成 Spring Boot Actuator + Micrometer；
#              为 /oauth2/jwks（JWK 公钥极少变更，高频请求）加 HTTP 缓存头
#   - 必须加一个简单的性能断言测试，证明 /oauth2/jwks 响应有 Cache-Control 头
#
# 用法：
#   kubectl apply -f k8s/smoke-tests/oauth2-perf.yaml
#   kubectl -n claude-pipeline logs -f -l job-name=oauth2-perf
#   kubectl -n claude-pipeline delete -f k8s/smoke-tests/oauth2-perf.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-perf-prompt
  namespace: claude-pipeline
data:
  prompt.md: |
    你是一个性能优化 Agent。本轮执行一个**可测量**的性能优化。

    ## 黄金法则（红线）
    - **先测量，后优化** —— 没有测量指标就不优化（猜测式优化一律拒绝）
    - **所有现有测试必须通过** —— 不能因优化破坏功能
    - **Public API 不变** —— 端点路径、方法、响应结构不变

    ## 本轮唯一目标

    为 `GET /oauth2/jwks` 端点添加 HTTP 层缓存控制。

    ### 理由（可测量的性能动机）
    - JWK 公钥极少变更（密钥对轮转周期按天/周）
    - 但每个 token 校验方都会频繁拉取此端点
    - 加 Cache-Control 可以让客户端 + CDN 复用，降低后端 QPS

    ### 硬指标
    - 响应必须带 `Cache-Control: public, max-age=3600` 头
    - 其他 OAuth2 端点（/oauth2/token、/oauth2/authorize）**禁止**加缓存头
    - 新增测试：断言 /oauth2/jwks 的 Cache-Control 头正确，max-age >= 600

    ## 执行步骤

    ### 1. 基线（必须跑）
    ```
    mvn test > /tmp/baseline.log 2>&1; echo "EXIT=$?" >> /tmp/baseline.log; tail -5 /tmp/baseline.log
    ```
    EXIT=0 继续；否则本轮目标改为"修复基线"并用 fix 类型提交。

    ### 2. 实现
    在 SecurityConfig 或专门的 WebMvcConfigurer 中配置：
    - 对 `/oauth2/jwks` 路径配置响应头拦截器或过滤器
    - 关键 header：`Cache-Control: public, max-age=3600`、`Vary: Accept`
    - 避免使用全局默认缓存策略（会波及其他端点）

    ### 3. 新增测试
    在 OAuth2IntegrationTest 或新测试类中加：
    - `test_jwks_endpoint_hasCacheControlHeader`：断言 Cache-Control 存在且 max-age >= 600
    - `test_token_endpoint_hasNoCacheHeader`：断言 /oauth2/token 没有 public 缓存（保持原行为）

    ### 4. 验证 + commit + push
    ```
    mvn test > /tmp/after.log 2>&1; echo "EXIT=$?" >> /tmp/after.log; tail -10 /tmp/after.log
    ```
    通过 → `perf(jwks): 为 JWK 端点添加 HTTP 缓存头` + 推送
    失败 → git checkout -- . 回滚，本轮改为 docs 类提交说明原因

    ## Commit 规范（严格执行）
    - `perf(<范围>): <描述>` 格式，简体中文
    - **严格禁止** `Co-Authored-By: Claude`、`Written by AI` 等 AI 署名
    - 不附加 Signed-off-by
    - 作者：使用 git 默认用户 qpzm7903

    ## 禁止事项
    - 禁止引入新的重量级依赖（如 Redis、Caffeine）—— 本轮只做 HTTP 层缓存
    - 禁止改 Security Filter Chain 的排序或类型（容易破坏授权流）
    - 禁止升主版本号（最多 PATCH）—— 本次优化不升 MINOR

    现在开始。
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oauth2-perf
  namespace: claude-pipeline
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: agent
        image: java-claude-pipeline:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ANTHROPIC_BASE_URL
          value: "http://litellm.litellm:4000"
        - name: ANTHROPIC_MODEL
          value: "deepseek-chat"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-bridge
              key: ANTHROPIC_API_KEY
        - name: REPO_URL
          value: "https://github.com/qpzm7903/job-demo"
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: GIT_TOKEN
        - name: GIT_AUTHOR_NAME
          value: "qpzm7903"
        - name: GIT_AUTHOR_EMAIL
          value: "noreply@qpzm7903.local"
        - name: PIPELINE_MODE
          value: "custom"
        - name: EXEC_MODE
          value: "iterate"
        - name: CLAUDE_PROMPT_FILE
          value: "/prompts/prompt.md"
        - name: ROUND_TIMEOUT
          value: "600"
        - name: MAX_ITERATIONS
          value: "3"
        - name: MAX_NOCHANGE
          value: "1"
        - name: ITER_COOLDOWN
          value: "10"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        volumeMounts:
        - name: prompt
          mountPath: /prompts
          readOnly: true
      volumes:
      - name: prompt
        configMap:
          name: oauth2-perf-prompt
