apiVersion: v1
kind: Namespace
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: deepseek-chat
        litellm_params:
          model: anthropic/deepseek-chat
          api_key: os.environ/DEEPSEEK_API_KEY
          api_base: https://api.deepseek.com/anthropic
      - model_name: deepseek-reasoner
        litellm_params:
          model: anthropic/deepseek-reasoner
          api_key: os.environ/DEEPSEEK_API_KEY
          api_base: https://api.deepseek.com/anthropic
      # 下方为 Claude 模型名别名：Claude Code 默认用 claude-* 模型名，通过别名透明路由到 deepseek
      - model_name: claude-3-5-sonnet-20241022
        litellm_params:
          model: anthropic/deepseek-chat
          api_key: os.environ/DEEPSEEK_API_KEY
          api_base: https://api.deepseek.com/anthropic
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/glm-5.1
          api_key: os.environ/ARK_API_KEY
          api_base: https://ark.cn-beijing.volces.com/api/coding
      - model_name: claude-opus-4-7
        litellm_params:
          model: anthropic/glm-5.1
          api_key: os.environ/ARK_API_KEY
          api_base: https://ark.cn-beijing.volces.com/api/coding
      - model_name: glm-5.1
        litellm_params:
          model: anthropic/glm-5.1
          api_key: os.environ/ARK_API_KEY
          api_base: https://ark.cn-beijing.volces.com/api/coding
      - model_name: kimi-k2.6
        litellm_params:
          model: anthropic/kimi-k2.6
          api_key: os.environ/ARK_API_KEY
          api_base: https://ark.cn-beijing.volces.com/api/coding
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
    litellm_settings:
      drop_params: true
      set_verbose: false
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: litellm
type: Opaque
stringData:
  # 👇 在这里直接填入所有的真实 API Key（即 All In One 环境变量配置区）
  LITELLM_MASTER_KEY: "sk-1234"
  LITELLM_SALT_KEY: "sk-litellm-salt-key-local-dev"
  DEEPSEEK_API_KEY: "***REVOKED-DEEPSEEK-KEY***"
  DASHSCOPE_APPS_API_KEY: "sk-你的阿里百炼Key"
  DASHSCOPE_API_KEY: "sk-你的通义千问Key"
  OPENAI_API_KEY: "sk-你的OpenAI_Key"
  ANTHROPIC_API_KEY: "sk-你的Claude_Key"
  NEWAPI_HIZUI_API_KEY: "***REVOKED-NEWAPI-KEY***"
  ARK_API_KEY: "***REVOKED-ARK-KEY***"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
      - name: litellm
        image: docker.litellm.ai/berriai/litellm:main-stable
        args:
        - --config
        - /app/config.yaml
        - --port
        - "4000"
        ports:
        - containerPort: 4000
        env:
        - name: DATABASE_URL
          value: "postgresql://litellm:litellm@litellm-postgres:5432/litellm"
        envFrom:
        - secretRef:
            name: litellm-secrets
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
      volumes:
      - name: config
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: litellm
spec:
  type: LoadBalancer
  ports:
  - port: 4000
    targetPort: 4000
  selector:
    app.kubernetes.io/name: litellm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-postgres-pvc
  namespace: litellm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-postgres
  namespace: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-postgres
  template:
    metadata:
      labels:
        app: litellm-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: litellm
        - name: POSTGRES_PASSWORD
          value: litellm
        - name: POSTGRES_DB
          value: litellm
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: litellm-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-postgres
  namespace: litellm
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: litellm-postgres