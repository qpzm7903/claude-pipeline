apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-pipeline-{REPO_SLUG}
  namespace: claude-pipeline
  labels:
    app.kubernetes.io/name: claude-pipeline
    app.kubernetes.io/component: agent
    claude-pipeline/repo: "{REPO_SLUG}"
spec:
  schedule: "{SCHEDULE}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: {JOB_DEADLINE}
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            claude-pipeline/repo: "{REPO_SLUG}"
        spec:
          serviceAccountName: claude-pipeline-agent
          restartPolicy: Never
          volumes:
            - name: cargo-registry-cache
              persistentVolumeClaim:
                claimName: cargo-registry-cache
          containers:
            - name: agent
              image: {IMAGE}
              imagePullPolicy: {IMAGE_PULL_POLICY}
              resources:
                requests:
                  memory: "2Gi"
                  cpu: "1000m"
                limits:
                  memory: "6Gi"
                  cpu: "4000m"
              volumeMounts:
                - name: cargo-registry-cache
                  mountPath: /home/pipeline/.cargo/registry
                - name: cargo-registry-cache
                  mountPath: /home/pipeline/.build-cache
                  subPath: _build-cache
              env:
                - name: REPO_URL
                  value: "{REPO_URL}"
                - name: ANTHROPIC_MODEL
                  value: "{MODEL}"
                - name: CLAUDE_MODEL
                  value: "{MODEL}"
                - name: ANTHROPIC_BASE_URL
                  value: "{ANTHROPIC_BASE_URL}"
                - name: GIT_AUTHOR_NAME
                  value: "{GIT_AUTHOR_NAME}"
                - name: GIT_AUTHOR_EMAIL
                  value: "{GIT_AUTHOR_EMAIL}"
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: claude-pipeline-secrets
                      key: ANTHROPIC_API_KEY
                - name: ANTHROPIC_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: claude-pipeline-secrets
                      key: ANTHROPIC_API_KEY
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: claude-pipeline-secrets
                      key: GIT_TOKEN
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: claude-pipeline-secrets
                      key: GIT_TOKEN
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: claude-pipeline-secrets
                      key: GIT_TOKEN
                # ── Prompt 自定义（可选，三选一） ─────────────────────────────
                #
                # ① 文件挂载（推荐）：
                #   1. 创建 ConfigMap:
                #      kubectl create configmap claude-prompt-{REPO_SLUG} \
                #        --from-file=prompt.txt=/path/to/custom-prompt.txt \
                #        -n claude-pipeline
                #   2. 取消下方 volumeMounts / volumes / env 三段注释
                #
                # - name: CLAUDE_PROMPT_FILE
                #   value: /prompts/prompt.txt
                #
                # ② 内联字符串（适合短 prompt）：
                # - name: CLAUDE_PROMPT
                #   valueFrom:
                #     configMapKeyRef:
                #       name: claude-prompt-{REPO_SLUG}
                #       key: prompt
                #
                # ③ 不配置 → 使用镜像内置 /agent/default-prompt.txt
