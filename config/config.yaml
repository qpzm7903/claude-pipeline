docker:
  image: "claude-pipeline-agent:latest"
  mem_limit: "4g"
  cpu_quota: 100000                 # 相当于1个CPU
  network_mode: "bridge"
  auto_remove: true

anthropic:
  # base_url: "https://api.anthropic.com"   # 留空则使用官方默认地址
  # 也可通过环境变量 ANTHROPIC_BASE_URL 覆盖（优先级高于此处配置）
  model: "claude-opus-4-5-20251001"
  # model 也可通过环境变量 CLAUDE_MODEL 覆盖

git:
  author_name: "Claude Pipeline Bot"
  author_email: "pipeline@claude.ai"
  branch_prefix: "task/"
  commit_prefix: "feat"

kubernetes:
  schedule: "*/5 * * * *"       # CronJob 触发频率（默认每5分钟）
  image_pull_policy: "Never"    # Never=本地镜像; IfNotPresent/Always=远端镜像
  namespace: "claude-pipeline"
